application:
  name: "happyrobot"
  fde-interview:
    fmcsa: cdc33e44d693a3a58451898d4ec9df862c65b954
    load-data: classpath:data/dummy_load_data.json
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    status:
      # Worst-to-best ordering. STARTING sits below UP so a warming-up index keeps
      # the aggregate health out of UP, and is reported as a 503 to callers.
      order: DOWN,OUT_OF_SERVICE,STARTING,UP
      http-mapping:
        STARTING: 503
        DOWN: 503
        OUT_OF_SERVICE: 503

