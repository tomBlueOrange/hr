name: Build and Push Docker Image

# Build the app and publish a Docker image to Docker Hub (toms127/hr) on every
# push to main. The Blue Orange dependencies are vendored under
# blue_orange_dependencies/, so no GitHub Packages credentials are needed.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  - your Docker Hub username (e.g. toms127)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with Read & Write scope
#                         (Docker Hub -> Account Settings -> Personal access tokens)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: toms127/hr

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Spring Boot fat jar (bundles React frontend)
        run: ./gradlew bootJar --no-daemon

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
